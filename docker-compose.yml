services:
  backend_panel:
    build: .
    container_name: panel_backend_container
    # Host networking so the API can reach MySQL/PM2 daemon/Docker socket on the VPS.
    network_mode: "host"
    restart: always
    env_file:
      - .env
    environment:
      - PM2_HOME=/root/.pm2
    volumes:
      # Mount Docker socket + PM2 daemon dir from host.
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.pm2:/root/.pm2
      # Optionally mount a host path so file manager + terminal can see real apps.
      # - /home/apps:/srv/apps:ro
